<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic editorial contact sheet</title>
  <desc id="desc">A warm editorial contact sheet showing lens, color grade, rhythm, and sequence decisions for cinematic image lessons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16120e"/>
      <stop offset=".58" stop-color="#3c281b"/>
      <stop offset="1" stop-color="#ead4b9"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" filter="url(#grain)" opacity=".45"/>
  <text x="72" y="104" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" letter-spacing="8" fill="#f0c49b">EDITORIAL SEQUENCE</text>
  <text x="72" y="170" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="850" fill="#fff8ee">Lens, grade, and rhythm before beauty.</text>
  <g transform="translate(72 238)">
    <rect width="248" height="170" rx="20" fill="#ead9c2" opacity=".92"/>
    <circle cx="78" cy="84" r="46" fill="#8b5a34" opacity=".32"/>
    <rect x="138" y="48" width="74" height="72" fill="#2a211b" opacity=".28"/>
    <text x="24" y="142" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="5" fill="#6d3e1f">35MM WIDE</text>
  </g>
  <g transform="translate(348 238)">
    <rect width="248" height="170" rx="20" fill="#d9c3aa" opacity=".92"/>
    <rect x="42" y="50" width="166" height="74" fill="#fff8ee" opacity=".25"/>
    <path d="M52 128c42-46 76-46 146 0" fill="none" stroke="#7b4923" stroke-width="8" opacity=".48"/>
    <text x="24" y="142" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="5" fill="#6d3e1f">85MM PORTRAIT</text>
  </g>
  <g transform="translate(624 238)">
    <rect width="248" height="170" rx="20" fill="#c8a98c" opacity=".92"/>
    <rect x="44" y="38" width="80" height="98" fill="#fff8ee" opacity=".22"/>
    <rect x="134" y="58" width="70" height="78" fill="#2a211b" opacity=".3"/>
    <text x="24" y="142" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="5" fill="#5e341b">MACRO DETAIL</text>
  </g>
  <g transform="translate(900 238)">
    <rect width="224" height="170" rx="20" fill="#f3e4cf" opacity=".9"/>
    <text x="26" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" letter-spacing="5" fill="#875123">GRADE</text>
    <rect x="28" y="84" width="36" height="48" fill="#f2dcc0"/>
    <rect x="76" y="84" width="36" height="48" fill="#c98249"/>
    <rect x="124" y="84" width="36" height="48" fill="#665243"/>
    <rect x="172" y="84" width="24" height="48" fill="#1d1a16"/>
  </g>
  <g transform="translate(72 472)">
    <rect width="1052" height="126" rx="24" fill="#fff8ee" opacity=".9"/>
    <text x="30" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="6" fill="#875123">SEQUENCE LOGIC</text>
    <text x="30" y="91" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#1d1a16">Establish the world -> isolate the face -> prove detail -> finish with color continuity.</text>
  </g>
  <g transform="translate(72 642)">
    <rect width="312" height="54" rx="27" fill="#fff8ee" opacity=".16" stroke="#fff8ee" stroke-opacity=".32"/>
    <text x="28" y="36" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#fff8ee">No random dark filters.</text>
    <rect x="350" width="424" height="54" rx="27" fill="#fff8ee" opacity=".16" stroke="#fff8ee" stroke-opacity=".32"/>
    <text x="378" y="36" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#fff8ee">Every frame has a job.</text>
  </g>
</svg>
