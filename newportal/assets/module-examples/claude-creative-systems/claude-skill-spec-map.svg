<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Claude creative systems skill spec map</title>
  <desc id="desc">A Claude creative system board showing skill context, shot direction, critique loop, and approval log.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".48" stop-color="#f1e3d1"/>
      <stop offset="1" stop-color="#fffdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1d1a16" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g transform="translate(58 56)">
    <text x="0" y="0" dy="22" font-family="JetBrains Mono, monospace" font-size="22" letter-spacing="9" fill="#8a4f25" font-weight="700">CLAUDE CREATIVE SYSTEM</text>
    <text x="0" y="84" font-family="Fraunces, Georgia, serif" font-size="64" font-style="italic" fill="#1d1a16">Turn taste into reusable instructions.</text>
    <text x="0" y="130" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#4b4138">Skills, shot direction, critique loops, and approval rules belong in one system.</text>
  </g>
  <g transform="translate(92 238)" filter="url(#shadow)" font-family="Inter, system-ui, sans-serif">
    <rect x="0" y="0" width="1016" height="392" rx="28" fill="#fffdf9" stroke="#ded4c7"/>
    <g transform="translate(50 54)">
      <g>
        <rect x="0" y="0" width="238" height="110" rx="22" fill="#fbf3e8" stroke="#eadfd2"/>
        <text x="24" y="38" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="5" fill="#8a4f25" font-weight="700">SKILL CONTEXT</text>
        <text x="24" y="78" font-size="26" fill="#1d1a16" font-weight="850">brand rules + examples</text>
      </g>
      <g transform="translate(340 0)">
        <rect x="0" y="0" width="238" height="110" rx="22" fill="#fff" stroke="#eadfd2"/>
        <text x="24" y="38" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="5" fill="#8a4f25" font-weight="700">SHOT DIRECTION</text>
        <text x="24" y="78" font-size="26" fill="#1d1a16" font-weight="850">camera + motion notes</text>
      </g>
      <g transform="translate(680 0)">
        <rect x="0" y="0" width="238" height="110" rx="22" fill="#fbf3e8" stroke="#eadfd2"/>
        <text x="24" y="38" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="5" fill="#8a4f25" font-weight="700">CRITIQUE LOOP</text>
        <text x="24" y="78" font-size="26" fill="#1d1a16" font-weight="850">risk + repair prompt</text>
      </g>
      <path d="M250 55h76M590 55h76" fill="none" stroke="#8a4f25" stroke-width="4" stroke-linecap="round"/>
      <path d="M320 47l12 8-12 8M660 47l12 8-12 8" fill="none" stroke="#8a4f25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(156 190)">
        <rect x="0" y="0" width="606" height="96" rx="22" fill="#edf3e7" stroke="#d7e2cf"/>
        <text x="28" y="36" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="5" fill="#52673e" font-weight="700">APPROVAL LOG</text>
        <text x="28" y="70" font-size="25" fill="#1d1a16" font-weight="850">draft prepared, critique passed, human approved</text>
      </g>
      <path d="M459 118v56" fill="none" stroke="#52673e" stroke-width="4" stroke-linecap="round"/>
      <path d="M451 164l8 12 8-12" fill="none" stroke="#52673e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
