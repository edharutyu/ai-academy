<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Solopreneur operations cockpit</title>
  <desc id="desc">A practical AI operations board for inbox, calendar, bookkeeping, proposal, and approval gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset=".6" stop-color="#efe4d4"/>
      <stop offset="1" stop-color="#fcf7ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1d1a16" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g transform="translate(58 58)">
    <text x="0" y="0" dy="22" font-family="JetBrains Mono, monospace" font-size="22" letter-spacing="9" fill="#8a4f25" font-weight="700">PRACTICAL AI OPERATIONS</text>
    <text x="0" y="84" font-family="Fraunces, Georgia, serif" font-size="64" font-style="italic" fill="#1d1a16">AI can draft. You still approve.</text>
    <text x="0" y="130" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#4b4138">Inbox, calendar, bookkeeping, and proposals need gates, not autopilot.</text>
  </g>
  <g transform="translate(72 240)" filter="url(#shadow)">
    <rect width="1056" height="390" rx="26" fill="#fffdf9" stroke="#ded4c7"/>
    <g transform="translate(36 42)">
      <g font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="5" fill="#8a4f25" font-weight="700">
        <text x="0" y="0">QUEUE</text>
        <text x="270" y="0">AI DRAFT</text>
        <text x="540" y="0">HUMAN GATE</text>
        <text x="810" y="0">RECEIPT</text>
      </g>
      <g transform="translate(0 38)" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#1d1a16" font-weight="760">
        <rect x="0" y="0" width="220" height="64" rx="16" fill="#fbf3e8" stroke="#eadfd2"/>
        <text x="22" y="40">new client email</text>
        <rect x="270" y="0" width="220" height="64" rx="16" fill="#fff" stroke="#eadfd2"/>
        <text x="292" y="40">reply draft</text>
        <rect x="540" y="0" width="220" height="64" rx="16" fill="#edf3e7" stroke="#d7e2cf"/>
        <text x="562" y="40">review before send</text>
        <rect x="810" y="0" width="174" height="64" rx="16" fill="#fff" stroke="#eadfd2"/>
        <text x="832" y="40">logged</text>
        <rect x="0" y="92" width="220" height="64" rx="16" fill="#fbf3e8" stroke="#eadfd2"/>
        <text x="22" y="132">calendar conflict</text>
        <rect x="270" y="92" width="220" height="64" rx="16" fill="#fff" stroke="#eadfd2"/>
        <text x="292" y="132">time options</text>
        <rect x="540" y="92" width="220" height="64" rx="16" fill="#edf3e7" stroke="#d7e2cf"/>
        <text x="562" y="132">owner chooses</text>
        <rect x="810" y="92" width="174" height="64" rx="16" fill="#fff" stroke="#eadfd2"/>
        <text x="832" y="132">scheduled</text>
        <rect x="0" y="184" width="220" height="64" rx="16" fill="#fbf3e8" stroke="#eadfd2"/>
        <text x="22" y="224">receipt pile</text>
        <rect x="270" y="184" width="220" height="64" rx="16" fill="#fff" stroke="#eadfd2"/>
        <text x="292" y="224">category guess</text>
        <rect x="540" y="184" width="220" height="64" rx="16" fill="#fff3df" stroke="#ead2b8"/>
        <text x="562" y="224">needs proof</text>
        <rect x="810" y="184" width="174" height="64" rx="16" fill="#fff" stroke="#eadfd2"/>
        <text x="832" y="224">exported</text>
      </g>
    </g>
  </g>
</svg>
