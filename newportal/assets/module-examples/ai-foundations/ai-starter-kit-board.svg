<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Foundations starter kit board</title>
  <desc id="desc">A warm editorial board showing task, context, tool choice, verification, and packaged output for beginner AI lessons.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="1" stop-color="#eadfce"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#paper)"/>
  <rect width="1200" height="760" filter="url(#grain)" opacity=".42"/>
  <rect x="54" y="54" width="1092" height="652" rx="28" fill="#fffdf7" stroke="#2b231c" stroke-opacity=".13"/>
  <text x="86" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="23" letter-spacing="8" fill="#8a4f24">AI STARTER KIT</text>
  <text x="86" y="176" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#1d1a16">Use AI by decision, not by hype.</text>
  <text x="88" y="224" font-family="Inter, Arial, sans-serif" font-size="24" fill="#5b4f43">One task becomes a prompt, a tool choice, a check, and a useful artifact.</text>
  <g transform="translate(86 292)">
    <rect width="192" height="206" rx="18" fill="#f6efe6" stroke="#2b231c" stroke-opacity=".1"/>
    <text x="22" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="5" fill="#875123">TASK</text>
    <text x="22" y="95" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d1a16">Name the job</text>
    <text x="22" y="132" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5b4f43">What should AI help with?</text>
  </g>
  <g transform="translate(306 292)">
    <rect width="192" height="206" rx="18" fill="#fffaf3" stroke="#2b231c" stroke-opacity=".1"/>
    <text x="22" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="5" fill="#875123">CONTEXT</text>
    <text x="22" y="95" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d1a16">Give facts</text>
    <text x="22" y="132" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5b4f43">Audience, input, limits.</text>
  </g>
  <g transform="translate(526 292)">
    <rect width="192" height="206" rx="18" fill="#f6efe6" stroke="#2b231c" stroke-opacity=".1"/>
    <text x="22" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="5" fill="#875123">TOOL</text>
    <text x="22" y="95" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d1a16">Pick mode</text>
    <text x="22" y="132" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5b4f43">Chat, image, research.</text>
  </g>
  <g transform="translate(746 292)">
    <rect width="192" height="206" rx="18" fill="#fffaf3" stroke="#2b231c" stroke-opacity=".1"/>
    <text x="22" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="5" fill="#875123">VERIFY</text>
    <text x="22" y="95" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d1a16">Check proof</text>
    <text x="22" y="132" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5b4f43">Source, output, risk.</text>
  </g>
  <g transform="translate(966 292)">
    <rect width="120" height="206" rx="18" fill="#52673e" opacity=".13"/>
    <text x="26" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="5" fill="#52673e">SHIP</text>
    <circle cx="60" cy="116" r="38" fill="none" stroke="#52673e" stroke-width="10"/>
    <path d="M42 116l14 14 28-34" fill="none" stroke="#52673e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M278 395h28M498 395h28M718 395h28M938 395h28" stroke="#c98249" stroke-width="5" stroke-linecap="round"/>
  <rect x="86" y="570" width="430" height="76" rx="18" fill="#1d1a16"/>
  <text x="116" y="618" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#fff8ee">A good AI task leaves evidence.</text>
  <rect x="548" y="570" width="538" height="76" rx="18" fill="#fff8ee" stroke="#2b231c" stroke-opacity=".1"/>
  <text x="578" y="618" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#3f362e">Prompt -> output -> revision note -> final artifact.</text>
</svg>
